services:
  nginx:
    image: nginx:alpine
    container_name: enclave-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dash-api
      - dash-ui

  dash-api:
    build: ./server
    container_name: enclave-api
    restart: always
    expose:
      - "3005"
    volumes:
      - /:/host:ro # System stats & read-only browsing
      - /home/ubuntu:/data # User home — read/write for file manager
      - /home/ubuntu/projects:/app/projects # Terminal workspace
      - /var/run/docker.sock:/var/run/docker.sock # Docker management
    env_file: .env

  dash-ui:
    build:
      context: ./client
      args:
        VITE_API_DOMAIN: ""
        VITE_DASHBOARD_DOMAIN: ${VITE_DASHBOARD_DOMAIN}
    container_name: enclave-ui
    restart: always
    expose:
      - "5173"
    depends_on:
      - dash-api
    env_file: .env
