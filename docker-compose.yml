version: '3.8'

services:
  dash-api:
    build: ./server
    container_name: enclave-api
    restart: always
    ports:
      - "3005:3005"
    volumes:
      - /:/rootfs:ro # Allows the container to read your Enclave's files
    environment:
      - NODE_ENV=production

  dash-ui:
    build: ./client
    container_name: enclave-ui
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - dash-api